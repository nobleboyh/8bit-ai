<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="#0f0e2e"/>
  <!-- spark -->
  <rect x="32" y="4" width="4" height="4" fill="#fcb84c"/>
  <rect x="28" y="8" width="8" height="4" fill="#fcb84c"/>
  <rect x="24" y="12" width="16" height="4" fill="#fcb84c"/>
  <!-- anvil horn -->
  <rect x="28" y="16" width="8" height="4" fill="#8888aa"/>
  <rect x="24" y="20" width="16" height="4" fill="#8888aa"/>
  <!-- anvil top -->
  <rect x="20" y="24" width="24" height="4" fill="#3a3a6e"/>
  <rect x="16" y="28" width="32" height="4" fill="#f0f0f0"/>
  <rect x="16" y="32" width="32" height="4" fill="#3a3a6e"/>
  <!-- anvil body -->
  <rect x="20" y="36" width="24" height="4" fill="#8888aa"/>
  <rect x="24" y="40" width="16" height="4" fill="#8888aa"/>
  <rect x="28" y="44" width="8" height="4" fill="#8888aa"/>
  <!-- glow -->
  <rect x="20" y="28" width="4" height="4" fill="#fcb84c"/>
  <rect x="40" y="28" width="4" height="4" fill="#fcb84c"/>
  <rect x="20" y="32" width="4" height="4" fill="#fcb84c" opacity="0.5"/>
  <rect x="40" y="32" width="4" height="4" fill="#fcb84c" opacity="0.5"/>
</svg>
